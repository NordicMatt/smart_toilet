# MCUboot image fragment (auto-applied by sysbuild to the mcuboot image).
# The bootloader needs the SPI-NOR driver so it can read/swap the secondary
# slot that lives in the external MX25R64 flash.
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_NORDIC_QSPI_NOR=n

# External-flash slots are larger than the internal default, so raise the
# maximum tracked image sectors (slot ~1 MB / 4 KB erase ≈ 256; 2048 is safe).
CONFIG_BOOT_MAX_IMG_SECTORS=2048
