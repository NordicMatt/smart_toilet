# MCUboot image fragment (auto-applied by sysbuild to the mcuboot image).
# The bootloader needs the SPI-NOR driver so it can read/swap the secondary
# slot that lives in the external MX25R64 flash.
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_NORDIC_QSPI_NOR=n

# Right-size the image-sector table: primary slot ~1874 KB / 4 KB ≈ 468
# sectors. 512 covers it with margin (was 2048, which oversized the RAM tables).
CONFIG_BOOT_MAX_IMG_SECTORS=512

# Trim the bootloader so it fits comfortably in its 54 KB partition. It does
# not need a serial console or logging in normal operation (the application's
# logs are on VCOM0); the SPI-NOR driver above is kept for the external slot.
CONFIG_LOG=n
CONFIG_MCUBOOT_LOG_LEVEL_OFF=y
CONFIG_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_BOOT_BANNER=n
