# nRF70 Wi-Fi firmware patch (system mode).
SB_CONFIG_WIFI_NRF70=y
SB_CONFIG_WIFI_NRF70_SCAN_ONLY=n

# Bootloader: MCUboot. The nRF54L uses devicetree partitioning (not the legacy
# Partition Manager), so the secondary slot is placed in the external MX25R64
# SPI-NOR via devicetree overlays (app board overlay + sysbuild/mcuboot.overlay)
# rather than the SB_CONFIG_PM_EXTERNAL_FLASH_* options (which require
# PARTITION_MANAGER and are silently ignored on this part).
SB_CONFIG_BOOTLOADER_MCUBOOT=y
