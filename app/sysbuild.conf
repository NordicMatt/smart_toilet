# nRF70 Wi-Fi firmware patch (system mode).
SB_CONFIG_WIFI_NRF70=y
SB_CONFIG_WIFI_NRF70_SCAN_ONLY=n

# Bootloader: MCUboot. FOTA on the nRF54L still requires the (deprecated)
# Partition Manager - the fota_download / dfu_target libraries include the
# PM-generated pm_config.h unconditionally - so enable PM and let it place the
# MCUboot secondary slot in the onboard MX25R64 SPI-NOR (8 MB on spi00). That
# keeps the second image off-chip so the internal RRAM primary slot holds the
# full Wi-Fi + cloud + Memfault app.
SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_PARTITION_MANAGER=y
SB_CONFIG_PM_EXTERNAL_FLASH_MCUBOOT_SECONDARY=y
# The MX25R64 is on SPI (spi00), not QSPI; the external-flash driver check
# defaults to QSPI, so override it.
SB_CONFIG_PM_OVERRIDE_EXTERNAL_DRIVER_CHECK=y
