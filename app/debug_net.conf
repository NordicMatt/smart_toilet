# TEMPORARY diagnostic overlay: trace the errno-113 (EHOSTUNREACH) path to
# Memfault on NCS 3.4.0. Shows DNS query/result, the socket connect target, and
# the DHCP lease (incl. the default router/route). Remove before shipping.
CONFIG_DNS_RESOLVER_LOG_LEVEL_DBG=y
CONFIG_NET_SOCKETS_LOG_LEVEL_DBG=y
CONFIG_NET_DHCPV4_LOG_LEVEL_DBG=y
CONFIG_NET_IF_LOG_LEVEL_INF=y
# mbedTLS handshake internals: names the exact failing handshake step
# (curve/sigalg selection, ServerKeyExchange verify, cert parse/verify flags).
# MBEDTLS_DEBUG is the Zephyr glue that installs the debug callback for native
# TLS sockets (implies MBEDTLS_DEBUG_C); the log level drives the threshold.
CONFIG_MBEDTLS_DEBUG=y
CONFIG_MBEDTLS_LOG_LEVEL_DBG=y
# nrf_security's MBEDTLS_DEBUG_LEVEL (prompted, default 0) wins over the Zephyr
# glue's derived default -- set the threshold explicitly or nothing is logged.
CONFIG_MBEDTLS_DEBUG_LEVEL=3
