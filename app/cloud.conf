# Wi-Fi + Memfault (HTTPS) connectivity for the smart toilet, SECURE build
# (cpuapp, no TF-M). Layered on top of prj.conf via EXTRA_CONF_FILE.
#
# The device talks ONLY to Memfault: diagnostics upload and FOTA both go
# directly to Memfault over HTTPS. No nRF Cloud connection, so only one TLS
# connection is ever active and there is no dual-connection memory pressure.

# --- Wi-Fi (nRF70 / nRF7002 EB II) ---
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y
CONFIG_WIFI_NRF70_SKIP_LOCAL_ADMIN_MAC=y
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_WIFI_CREDENTIALS=y
# Static credentials (no shell in this app). For a personal device on a known
# network; move to runtime provisioning later if desired.
#
# SSID/password are NOT set here - they must never be committed to source.
# Pass them at build time (same pattern as CONFIG_MEMFAULT_NCS_PROJECT_KEY):
#   -DCONFIG_WIFI_CREDENTIALS_STATIC_SSID=\"$(cat ~/.wifi_ssid)\"
#   -DCONFIG_WIFI_CREDENTIALS_STATIC_PASSWORD=\"$(cat ~/.wifi_password)\"
# See docs/fota-test.md / README.md for the full build command.
CONFIG_WIFI_CREDENTIALS_STATIC=y
# OTP MAC on the EB II may be unprogrammed. A single fixed MAC broke down once a
# second unit joined the same network (both devices presented the identical MAC,
# causing ARP/DHCP conflicts and intermittent cloud connectivity on both). Use a
# runtime-random MAC (HW entropy) instead so every unit gets its own address with
# no per-device build config.
CONFIG_WIFI_RANDOM_MAC_ADDRESS=y

# --- Wi-Fi keepalive (v1.8.10) ---
# Toilet #2's recurring silent-drop root cause: legacy Wi-Fi power save
# (CONFIG_NRF_WIFI_LOW_POWER=y, kept ON for the low-power roadmap) lets the Nest
# mesh deauth/steer the dozing client without it noticing -- wifi_disconnect_count
# stayed 0 through an 11 h run while the link was actually dead, so every socket op
# (getaddrinfo, TLS) failed until the watchdog rebooted. Keepalive sends a periodic
# frame so an idle client is not silently dropped/steered. (TWT -- the clean
# low-power path that would avoid this -- is unavailable: the Nest AP reports no
# TWT on 5 GHz and the nRF7002 has no 6 GHz radio.) Pairs with the
# reconnect-not-reboot recovery in cloud.c.
CONFIG_NRF_WIFI_FEAT_KEEPALIVE=y
CONFIG_NRF_WIFI_KEEPALIVE_PERIOD_S=30
# --- Disable Wi-Fi power save (v1.8.12) ---
# The silent drop persisted on BOTH units through 1.8.11 (Nest mesh dropping/
# steering the dozing client; wifi_disconnect_count stays 0). The nRF70 driver
# enables STA power save -- nrf_wifi_sys_fmac_set_power_save(NRF_WIFI_PS_ENABLED)
# on iface start -- ONLY under CONFIG_NRF_WIFI_LOW_POWER (net_if.c). Turning it
# off keeps the radio awake so it hears the deauth/steer, raises a REAL disconnect
# (which conn_mgr then auto-reconnects) instead of ending up silently half-open.
# USB-powered, so the extra draw is fine; TWT (the only low-power path that would
# avoid this) is unavailable on this Nest/5 GHz + nRF7002 anyway. Keepalive stays
# on to also keep the AP from treating an idle client as gone.
CONFIG_NRF_WIFI_LOW_POWER=n

# --- Networking stack ---
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_NET_TCP=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_DNS_TIMEOUT=30000
# --- DNS resilience (v1.8.9) ---
# Root cause of Toilet #2's soft-hang (coredump trace 10424914060): on a lossy
# link, getaddrinfo() to the Memfault hosts kept failing (30 s timeout, retry,
# fail...), so no upload ever landed and the upload watchdog rebooted it every
# ~20 min. Memfault's HTTP port (prv_getaddrinfo) does a FRESH DNS lookup on
# every connection with no caching, against only the single DHCP/router-provided
# resolver. Harden it two ways:
#   1. Cache successful lookups (TTL-bounded) so a transient DNS glitch reuses
#      the last-known Memfault IP instead of re-querying flaky DNS every time.
#   2. Add reliable public resolvers so we do not depend solely on the router's
#      DNS (static servers coexist with the DHCP-provided one; the resolver uses
#      all of them). Network here is Google Wi-Fi, so external DNS is reachable.
# The upload-success watchdog stays as the guaranteed backstop if DNS is down
# long enough that even these do not help.
CONFIG_DNS_RESOLVER_CACHE=y
CONFIG_DNS_RESOLVER_CACHE_MAX_ENTRIES=8
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"
CONFIG_DNS_SERVER2="1.1.1.1"
# Memfault opens its upload connection and (during FOTA) a download connection;
# generous context counts avoid "Not enough connection contexts" stalls.
CONFIG_NET_MAX_CONN=8
CONFIG_NET_MAX_CONTEXTS=10

# --- conn_mgr (manages Wi-Fi link via stored credentials) ---
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_L2_WIFI_CONNECTIVITY=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=4850

# --- settings/NVS (WIFI_CREDENTIALS + persisted flush count) ---
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# --- Security / mbedTLS for HTTPS to Memfault ---
CONFIG_NRF_SECURITY=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
# Sized comfortably for one TLS session (the Memfault HTTPS connection) plus the
# Wi-Fi supplicant's crypto plus the Memfault HTTPS sessions.
CONFIG_MBEDTLS_HEAP_SIZE=81920
CONFIG_MBEDTLS_RSA_C=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
# Memfault uses several short-lived TLS connections (data upload, the OTA-check
# query, and the FOTA image download), and each DNS lookup tries IPv6 then IPv4.
# The default of 1 context is not enough — uploads fail with "Failed to allocate
# TLS context" (errno 12) once any of these overlap, which silently stops
# heartbeat/metric uploads. Give the pool headroom.
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=4
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
# Critical: keep TLS crypto in mbedTLS directly (not PSA/TF-M) or the Wi-Fi
# supplicant / TLS handshakes fail. See memory smart-toilet-cloud.
CONFIG_HOSTAP_CRYPTO_ALT_LEGACY_PSA=y

# --- TLS credentials: volatile backend (Memfault installs its CA certs here) ---
CONFIG_TLS_CREDENTIALS=y
CONFIG_TLS_CREDENTIALS_BACKEND_VOLATILE=y

# Float printf in the C library (newlib, required by Edge AI) for the dBFS /
# probability values logged by the audio telemetry.
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# Device identity: use the hardware ID as the Memfault device serial
# (CONFIG_MEMFAULT_NCS_DEVICE_ID_HW_ID in prj.conf selects HW_ID_LIBRARY).
CONFIG_HW_ID_LIBRARY=y

# --- date/time via NTP (no modem); required for TLS certificate date checks ---
CONFIG_DATE_TIME=y
CONFIG_DATE_TIME_NTP=y
CONFIG_DATE_TIME_AUTO_UPDATE=n
CONFIG_DATE_TIME_MODEM=n
CONFIG_DATE_TIME_THREAD_STACK_SIZE=4096

# --- heaps / stacks for Wi-Fi + TLS ---
CONFIG_HEAP_MEM_POOL_SIZE=40144
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=20000
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=92856
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_MAIN_STACK_SIZE=4096
# Bumped 4096 -> 8192 (v1.8.11): the reconnect-not-reboot work runs on the system
# workqueue and calls conn_mgr disconnect/connect, whose Wi-Fi/supplicant cascade
# is stack-heavy (NCS's own Wi-Fi conn workqueue uses 6 KB for exactly this). At
# 4 KB it overflowed and HardFaulted (the v1.8.10 assert on sysworkq).
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=30
CONFIG_NET_MGMT_EVENT_STACK_SIZE=8000
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_ZVFS_POLL_MAX=8

# --- logging ---
CONFIG_NET_LOG=y
CONFIG_LOG_PRINTK=y
# Deferred logging: log records are queued and drained by the log thread instead
# of formatted inline on the calling thread. Immediate mode was serialising the
# FOTA download (a log line per 1 KB block formatted synchronously on the
# downloader thread), throttling it to ~6 KB/s; deferred removes that bottleneck.
CONFIG_LOG_MODE_DEFERRED=y
# Buffer enough records that the verbose per-block download progress doesn't
# overflow and drop the boot/connect lines we rely on.
CONFIG_LOG_BUFFER_SIZE=8192
# Name threads so a stack-overflow fault reports which thread.
CONFIG_THREAD_NAME=y

# Audio/wake-word loop runs on the main thread. It only starts AFTER the network
# comes up (see main.c), so it no longer competes with Wi-Fi bring-up and can
# run at a higher priority for lower audio scheduling jitter. The loop is
# DMIC-paced (blocks on dmic_read each block), so it yields constantly and won't
# hog the CPU. Kept above the cloud thread (7) and WPA workqueue (7) but below
# the priority-0 network-critical threads and the cooperative system workqueue.
CONFIG_MAIN_THREAD_PRIORITY=6

# --- FOTA: image download + DFU target to the MCUboot secondary slot (which
# lives in the external MX25R64 flash). The Memfault FOTA backend (below) drives
# this fota_download over HTTPS. ---
CONFIG_FOTA_DOWNLOAD=y
CONFIG_DFU_TARGET=y
CONFIG_DFU_TARGET_MCUBOOT=y
CONFIG_DOWNLOADER=y
CONFIG_DOWNLOADER_TRANSPORT_HTTP=y
CONFIG_DOWNLOADER_STACK_SIZE=4352
# Memfault OTA CDN URLs carry a long signed token; the Memfault FOTA backend
# requires the downloader filename buffer to be >= 400 (default 255).
CONFIG_DOWNLOADER_MAX_FILENAME_SIZE=512
CONFIG_REBOOT=y

# Flash / image management for the swap.
CONFIG_STREAM_FLASH_ERASE=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
# Erase the secondary slot progressively as data arrives (external SPI-NOR).
CONFIG_IMG_ERASE_PROGRESSIVELY=y

# --- Memfault over HTTPS: diagnostics upload + Release Management FOTA ---
# Talk to Memfault's APIs directly over HTTPS (chunks upload + OTA query). The
# project key (prj.conf, passed at build) authenticates the device.
CONFIG_MEMFAULT_HTTP_ENABLE=y
# FOTA via Memfault Release Management, using the NCS fota_download backend so
# the image is staged to the external-flash MCUboot secondary (above).
CONFIG_MEMFAULT_ZEPHYR_FOTA=y
CONFIG_MEMFAULT_ZEPHYR_FOTA_BACKEND_NCS=y
# Install Memfault's TLS root certificates at boot, into Zephyr's TLS credential
# store (works with the native Wi-Fi TLS stack). Covers chunks/device/ota CDN
# hosts, so no application-managed certificates are needed.
CONFIG_MEMFAULT_NCS_PROVISION_CERTIFICATES=y
CONFIG_MEMFAULT_ROOT_CERT_STORAGE_TLS_CREDENTIAL_STORAGE=y
# Event storage holds a serialized heartbeat (≈35 metrics) plus reboot/trace
# events between uploads; the 1024-byte default is tight, so give it room.
CONFIG_MEMFAULT_EVENT_STORAGE_SIZE=2048
# TCP/IP stats (retransmits, bytes sent/received, etc.) in each heartbeat.
# CONFIG_MEMFAULT_METRICS_TCP_IP is already on by default; it just needs
# Zephyr's own net-stats counters enabled to have data to report.
CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_USER_API=y

# --- Deployed build: quiet the UART ---
# Turn off the per-second audio/wake-word tuning logs in the deployed (cloud)
# build. The Memfault audio metrics still flow (audio_stats.c feeds them
# whenever CONFIG_MEMFAULT is set, independent of this option), so remote
# diagnosis is unaffected. Flip back to =y on a bench build to retune the mic.
CONFIG_APP_AUDIO_STATS=n
# NOTE: every released build must also have its symbols uploaded
# (`memfault upload-mcu-symbols build/app/zephyr/zephyr.elf`) or Memfault cannot
# decode the heartbeat metrics. See docs/fota-test.md.
