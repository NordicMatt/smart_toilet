# Wi-Fi + nRF Cloud (CoAP) connectivity for the smart toilet, SECURE build
# (cpuapp, no TF-M). Layered on top of prj.conf via EXTRA_CONF_FILE.

# --- Wi-Fi (nRF70 / nRF7002 EB II) ---
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y
CONFIG_WIFI_NRF70_SKIP_LOCAL_ADMIN_MAC=y
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_WIFI_CREDENTIALS=y
# Static credentials (no shell in this app). For a personal device on a known
# network; move to runtime provisioning later if desired.
CONFIG_WIFI_CREDENTIALS_STATIC=y
CONFIG_WIFI_CREDENTIALS_STATIC_SSID="Squishy"
CONFIG_WIFI_CREDENTIALS_STATIC_PASSWORD="***REMOVED***"
# OTP MAC on the EB II may be unprogrammed; provide a fixed locally-administered MAC.
CONFIG_WIFI_FIXED_MAC_ADDRESS="F6:CE:36:01:02:03"

# --- Networking stack ---
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_NET_TCP=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_DNS_TIMEOUT=30000

# --- conn_mgr (manages Wi-Fi link via stored credentials) ---
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_L2_WIFI_CONNECTIVITY=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=4850

# --- settings/NVS (required by WIFI_CREDENTIALS) ---
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# --- Security / mbedTLS / DTLS (secure, legacy PSA path) ---
CONFIG_NRF_SECURITY=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=49152
CONFIG_MBEDTLS_RSA_C=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_DTLS=y
CONFIG_MBEDTLS_SSL_SRV_C=y
CONFIG_MBEDTLS_SSL_COOKIE_C=y
CONFIG_MBEDTLS_SSL_DTLS_HELLO_VERIFY=y
CONFIG_MBEDTLS_SSL_DTLS_CONNECTION_ID=y
CONFIG_NET_SOCKETS_ENABLE_DTLS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_SET_MAX_FRAGMENT_LENGTH=y
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
# Critical: keep TLS crypto in mbedTLS directly (not PSA/TF-M) or DTLS to
# coap.nrfcloud.com fails (-111). See memory smart-toilet-cloud.
CONFIG_HOSTAP_CRYPTO_ALT_LEGACY_PSA=y

# --- TLS credentials: volatile backend, certs compiled in ---
CONFIG_TLS_CREDENTIALS=y
CONFIG_TLS_CREDENTIALS_BACKEND_VOLATILE=y

# cJSON (selected by NRF_CLOUD_COAP) needs float printf in the C library.
# The app uses newlib (required by Edge AI), so enable its float printf.
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# --- nRF Cloud over CoAP ---
# NRF_CLOUD_COAP depends on NRF_CLOUD; both must be enabled.
CONFIG_NRF_CLOUD=y
CONFIG_NRF_CLOUD_COAP=y
# No modem: JWTs are created and signed in software by the nRF Cloud library
# using the device private key (selects APP_JWT). Required or the link fails
# with undefined reference to nrf_cloud_jwt_generate.
CONFIG_NRF_CLOUD_JWT_SOURCE_CUSTOM=y
# No GNSS on this device: disable location/A-GNSS/P-GPS (also fixes a missing
# nrf_cloud_agnss_schema header at build time).
CONFIG_NRF_CLOUD_LOCATION=n
CONFIG_NRF_CLOUD_AGNSS=n
CONFIG_NRF_CLOUD_PGPS=n
CONFIG_NRF_CLOUD_PROVISION_CERTIFICATES=y
CONFIG_NRF_CLOUD_CLIENT_ID_SRC_HW_ID=y
CONFIG_HW_ID_LIBRARY=y
CONFIG_COAP_CLIENT_BLOCK_SIZE=1024
CONFIG_COAP_CLIENT_STACK_SIZE=6144
CONFIG_COAP_CLIENT_THREAD_PRIORITY=0
# FOTA downloads over CoAP need longer CoAP option storage for the download
# resource path (the nRF Cloud CoAP samples use 192).
CONFIG_COAP_EXTENDED_OPTIONS_LEN=y
CONFIG_COAP_EXTENDED_OPTIONS_LEN_VALUE=192

# --- date/time via NTP (no modem) ---
CONFIG_DATE_TIME=y
CONFIG_DATE_TIME_NTP=y
CONFIG_DATE_TIME_AUTO_UPDATE=n
CONFIG_DATE_TIME_MODEM=n

# --- heaps / stacks for Wi-Fi + TLS ---
CONFIG_HEAP_MEM_POOL_SIZE=40144
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=20000
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=92856
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=30
CONFIG_NET_MGMT_EVENT_STACK_SIZE=8000
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_ZVFS_POLL_MAX=8

# --- logging ---
CONFIG_NET_LOG=y
CONFIG_LOG_PRINTK=y

# Audio/wake-word loop runs on the main thread. It only starts AFTER nRF Cloud
# connects (see main.c), so it no longer competes with Wi-Fi bring-up and can
# run at a higher priority for lower audio scheduling jitter. The loop is
# DMIC-paced (blocks on dmic_read each block), so it yields constantly and
# won't hog the CPU. Kept above the cloud thread (7) and WPA workqueue (7) but
# below the priority-0 network-critical threads (WPA supplicant, CoAP client)
# and the cooperative system workqueue (-1), so Wi-Fi RX / cloud aren't starved.
CONFIG_MAIN_THREAD_PRIORITY=6

# Synchronous logging to pinpoint where Wi-Fi init stalls in the merged app.
CONFIG_LOG_MODE_IMMEDIATE=y

# Name threads so a stack-overflow fault reports which thread.
CONFIG_THREAD_NAME=y

# date_time NTP fetch (DNS + socket) needs a larger workqueue stack.
CONFIG_DATE_TIME_THREAD_STACK_SIZE=4096

# --- nRF Cloud FOTA over CoAP (application image, MCUboot) ---
# CoAP is client-driven, so FOTA is poll-based (nrf_cloud_fota_poll), not the
# MQTT-style push FOTA (CONFIG_NRF_CLOUD_FOTA stays off).
CONFIG_NRF_CLOUD_FOTA_POLL=y
CONFIG_NRF_CLOUD_FOTA=n
# Advertise application-FOTA support in the shadow (serviceInfo "fota_v2").
CONFIG_NRF_CLOUD_SEND_SERVICE_INFO_FOTA=y
# Pull the image over the existing CoAP connection instead of a separate
# HTTPS download (no extra download-host certificate needed).
CONFIG_NRF_CLOUD_COAP_DOWNLOADS=y

# FOTA download + DFU target: write the incoming image to the MCUboot
# secondary slot (which lives in the external MX25R64 flash).
CONFIG_FOTA_DOWNLOAD=y
CONFIG_DFU_TARGET=y
CONFIG_DFU_TARGET_MCUBOOT=y
CONFIG_DOWNLOADER=y
CONFIG_DOWNLOADER_STACK_SIZE=4352
CONFIG_REBOOT=y

# Flash / image management for the swap.
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH_ERASE=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
# Erase the secondary slot progressively as data arrives (external SPI-NOR).
CONFIG_IMG_ERASE_PROGRESSIVELY=y

# --- Memfault-backed OTA (nRF Cloud FOTA is migrating to Memfault) ---
# Use the Memfault nRF Cloud CoAP integration for data upload AND let it
# intercept nrf_cloud_coap_fota_job_get() to deliver firmware from Memfault
# Release Management. nrf_cloud_fota_poll_process() (cloud.c) is unchanged.
# Requires Memfault SDK >= 1.40.0 (module pinned in the workspace).
CONFIG_MEMFAULT_USE_NRF_CLOUD_COAP=y
CONFIG_MEMFAULT_ZEPHYR_FOTA=y
CONFIG_MEMFAULT_ZEPHYR_FOTA_BACKEND_NRF_CLOUD_OVERRIDE=y
# The Memfault integration adds CoAP user options (project key 2429, etc.).
CONFIG_NRF_CLOUD_COAP_MAX_USER_OPTIONS=2
# CoAP client must allow internal(1) + user(2) = 3 extra options (default 2),
# or nrf_cloud_coap_transport.c's BUILD_ASSERT fails.
CONFIG_COAP_CLIENT_MAX_EXTRA_OPTIONS=3
