description: |
  Smart toilet flush actuator: a single GPIO output that drives a
  relay or solenoid. The cell flags select the active level.

compatible: "smart-toilet,flush-actuator"

properties:
  gpios:
    type: phandle-array
    required: true
    description: GPIO that drives the flush relay/solenoid.
