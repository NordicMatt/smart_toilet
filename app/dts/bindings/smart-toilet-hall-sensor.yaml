description: |
  Smart toilet Hall effect sensor input. The magnet on the motor shaft
  asserts this line (active low) when it passes the sensor.

compatible: "smart-toilet,hall-sensor"

properties:
  gpios:
    type: phandle-array
    required: true
    description: GPIO connected to the Hall sensor output.
