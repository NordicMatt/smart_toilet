# Smart toilet: single "Abracadabra" wake word, no keyword-spotting stage.
# On detection the app blinks LED0 and prints "Wakeword detected" on VCOM0.
CONFIG_APP_MODE_WW_ONLY=y

# Active wake word (see APP_WW_MODEL choice in Kconfig).
CONFIG_APP_WW_MODEL_ABRACADABRA=y

# Wake-word detection sensitivity (defaults were 990/20/15 = too strict).
# Per-frame probability bar, in 1/1000 (0.60).
CONFIG_WW_PROBABILITY_THRESHOLD=600
# Sliding vote window length, in ~30 ms inference frames (20 = 600 ms).
CONFIG_WW_HISTORY_SIZE=20
# Frames-above-threshold required within the window to fire (5 of 20).
# 7 -> 5 (v2.0.8): field data showed a brief clean utterance peaking at 84%
# confidence (well above the 60% bar) getting rejected by the vote gate --
# quick speakers don't sustain 7 frames (~210 ms) above threshold. 5 accepts
# brief confident utterances; watch ww_detections vs flush_count for any
# false-accept uptick.
CONFIG_WW_COUNT_THRESHOLD=5
# PDM digital gain in dB (0.5 dB hardware steps, range -20..+20). Hardware max.
# HISTORY: v2.0.8 cut this to 12 for saturation headroom (clipped speech zeroes
# the model) and wake word detection STOPPED WORKING at normal voice/distance --
# the model is effectively calibrated to the +20 dB input scaling and the
# software AGC (post-capture) did not compensate. v2.0.9 reverts to the known-
# good 20. LESSON: do not change capture gain without re-validating the model;
# the saturation fix must come from somewhere else (clip-aware preprocessing or
# retraining across input levels), not from the hardware gain.
CONFIG_APP_PDM_GAIN_DB=20

# Front-end cleanup applied to each audio block before detection.
# 120 Hz Butterworth high-pass: strips rumble/handling noise below speech.
CONFIG_APP_AUDIO_HPF=y
# Software AGC: OFF (v2.0.10). Its slowly-drifting gain state deafened the
# units over hours: fresh-boot detections hit 99% (AGC ~unity) on BOTH units,
# then attempts hours into an uptime returned confidence 0 on healthy audio,
# and post-AGC software clipping showed up in the clip counter (the AGC's
# +/-12 dB acts after hardware capture; wound-up gain pushed speech onsets
# into int16 saturation, which zeroes the model). Detection consistency beats
# distance compensation. If re-enabled, add state-drift protection (decay
# gain toward unity while gated, bound the envelope) and re-validate over
# multi-hour uptimes, not just post-boot. (Target was -20 dBFS.)
CONFIG_APP_AGC=n

# Audio snapshot: DISABLED in the Wi-Fi build. Its multi-second 16 kHz capture
# buffer is hundreds of KB and does not fit alongside the Wi-Fi/cloud/Memfault
# stacks, and its raw-UART dump conflicts with the shield's VCOM0 console.
CONFIG_APP_AUDIO_SNAP=n

# Mic/wake-word tuning telemetry via LOG (VCOM0 with the shield), once per
# second: "audio: peak/rms dBFS + clipped samples" and "ww: peak prob/votes".
# OFF (v2.0.6): tuning is done, and the 1 Hz spam would wrap the 2 KB Memfault
# log ring in ~20 s, evicting the error lines coredumps should carry. The
# audio_peak_dbfs/ww_* heartbeat METRICS are unaffected (audio_telemetry.c
# atomics, not these log lines). Re-enable locally when re-tuning the mic.
CONFIG_APP_AUDIO_STATS=n
# Float formatting in log messages (dBFS, probabilities).
CONFIG_CBPRINTF_FP_SUPPORT=y

# nRF Edge AI
CONFIG_NRF_EDGEAI=y

# nRF Edge AI dependencies. Edge AI v2.2.0 is picolibc-ABI, and NCS 3.4.0 makes
# picolibc the default libc (newlib is deprecated). PICOLIBC_IO_FLOAT enables
# float printing (dBFS / wake-word probabilities in our LOG output).
CONFIG_NRF_AXON=y
CONFIG_PICOLIBC_IO_FLOAT=y
CONFIG_FPU=y

# Bound the common-libc malloc arena to a fixed size. The Wi-Fi supplicant
# force-selects COMMON_LIBC_MALLOC; leaving ARENA_SIZE unbounded (-1) previously
# let it collide with the libc float-formatting heap and fault cloud_tid during
# nRF Cloud JWT generation. A fixed arena in static bss avoids that.
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=40960

# Size of interlayer buffer to fit model
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=6656

# Size of psum buffer to fit model
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

# Enable sensor, button and LED libraries
CONFIG_GPIO=y
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# Enable logging and assert
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_ASSERT=y

# Async UART is not used: with the nRF7002 shield the console moves to UART30
# (VCOM0) and control output goes via printk, so the async API is left off.
CONFIG_UART_ASYNC_API=n

# --- Memfault (coredumps, reboot reasons, metrics) ---
# Captured on-device and forwarded as chunks through the nRF Cloud CoAP
# connection (see cloud.c). No device-side project key needed for forwarding.
CONFIG_MEMFAULT=y
# Memfault project key is passed at build time (-DCONFIG_MEMFAULT_NCS_PROJECT_KEY)
# from ~/.memfault_project_key so the key isn't committed. Needed now that
# Memfault handles data upload + OTA over nRF Cloud CoAP (see cloud.conf).
CONFIG_MEMFAULT_NCS_DEVICE_ID_HW_ID=y
CONFIG_MEMFAULT_NCS_FW_TYPE="smart-toilet"
# Reported FW version. Left STATIC but NOT hardcoded: with no explicit value the
# NCS default is $(APP_VERSION_TWEAK_STRING), i.e. app/VERSION (-> "1.1.0+0").
# This MUST track app/VERSION: Memfault Release Management decides whether to
# offer an OTA by comparing the device's reported version against the active
# release's version. The old hardcoded "1.0.0+wifi" never changed between
# builds, so Memfault would see every new image as "already current" and never
# deliver the update. Single-sourcing from app/VERSION prevents that.
CONFIG_MEMFAULT_NCS_FW_VERSION_STATIC=y
CONFIG_MEMFAULT_NCS_HW_VERSION="nrf54lm20dk"
CONFIG_MEMFAULT_RAM_BACKED_COREDUMP=y
# Sized to hold the stalled thread's stack: the audio/cloud stall watchdogs fire
# from a timer ISR, so the wedged thread (main or cloud_tid) is captured via the
# all-thread stack collection (MEMFAULT_COREDUMP_COLLECT_TASKS_REGIONS, default
# y). 4096 truncated once those stacks were added; 16384 keeps enough frames to
# locate the wedge. Costs ~12 KB of .noinit RAM.
CONFIG_MEMFAULT_RAM_BACKED_COREDUMP_SIZE=16384
# Collect more of each thread's stack (default 256 B ~ 4 frames) so the wedge
# point in the non-active stalled thread is deep enough to be actionable.
CONFIG_MEMFAULT_COREDUMP_STACK_SIZE_TO_COLLECT=512
# Enable user Memfault config so app/config/memfault_metrics_heartbeat_config.def
# (the audio/wake-word metrics) is compiled in. SILENT_FAIL keeps the build OK
# even though we don't provide the other two optional files (platform config,
# trace-reason defs) — they're skipped via __has_include.
CONFIG_MEMFAULT_USER_CONFIG_ENABLE=y
CONFIG_MEMFAULT_USER_CONFIG_SILENT_FAIL=y
# 10-minute heartbeat so the audio/wake-word metrics (audio_telemetry.c) give
# usable granularity for remote wake-word diagnosis (default is 3600 s).
CONFIG_MEMFAULT_METRICS_HEARTBEAT_INTERVAL_SECS=600
# We provide our own memfault_metrics_heartbeat_collect_data() (audio_telemetry.c)
# to publish the audio metrics, so disable the NCS port's definition of it (it
# would otherwise multiply-define the symbol). Our hook still calls
# memfault_ncs_metrics_collect_data() so NCS stack metrics keep working.
CONFIG_MEMFAULT_NCS_IMPLEMENT_METRICS_COLLECTION=n

# --- Edge AI Observability: on-device ML metrics -> Memfault CDR ---
# The Edge AI add-on's observability library (nrf_edgeai_obsv) accumulates a
# histogram of the wake-word model's output probability on-device and ships it
# to Memfault as a Custom Data Recording (a CBOR blob), riding the SAME HTTPS
# drain as coredumps/heartbeats (cloud.c upload_memfault_data()). This is field
# ML-quality monitoring: it shows how confidently "abracadabra" fires across the
# fleet and flags model/mic drift for retraining decisions.
CONFIG_NRF_EDGEAI_OBSV=y
# The wake-word model is single-output (one probability = P(wakeword)), so
# num_classes is 1. Only the probability-distribution metric is meaningful here;
# the transition matrix (class-to-class) is degenerate for one class -> left off.
CONFIG_NRF_EDGEAI_OBSV_MAX_CLASSES=1
CONFIG_NRF_EDGEAI_OBSV_METRIC_PROBS_DISTRIBUTION=y
# 8 bins over [0,1]: resolves how often the model sits near 0 (silence/noise)
# versus firing near 1 (clear utterance) out in the field.
CONFIG_NRF_EDGEAI_OBSV_PROBS_DISTRIBUTION_BIN_NUM=8
# CBOR encoder (turns obsv snapshots into bytes for transport). Needs ZCBOR.
CONFIG_ZCBOR=y
CONFIG_NRF_EDGEAI_OBSV_ENCODE=y
# Memfault CDR transport: stage the encoded blob as a Custom Data Recording that
# the Memfault packetizer drains alongside heartbeats over HTTPS.
CONFIG_MEMFAULT_CDR_ENABLE=y
CONFIG_NRF_EDGEAI_OBSV_MEMFAULT=y
# Refresh the staged CDR periodically on the system workqueue (no app timer
# needed); ~162 B stack buffer, absorbed by the existing workqueue stack.
# Twice per day (v2.0.13): the collect timer and the in-RAM histogram BOTH reset on
# every reboot, so a unit that reboots before reaching the interval as uptime never
# completes a window and ships NO CDR. At 86400 (v2.0.2) this silently starved every
# CDR on any frequently-rebooting unit -- e.g. Toilet #2, whose ~daily Wi-Fi
# disconnect-recovery reboots land near 22-23 h uptime, so its daily CDR never fired
# (last one 2026-07-12). Memfault still retains at most 1 CDR/device/day, so 12 h
# does not spam the backend; it just guarantees a collection lands within a sub-24 h
# uptime. Was 86400. (Backend cap chosen at v2.0.2 to avoid re-encoding ~143x/day;
# raise the project limit or use developer mode before shortening below the cap.)
CONFIG_NRF_EDGEAI_OBSV_MEMFAULT_AUTO_COLLECT=y
CONFIG_NRF_EDGEAI_OBSV_MEMFAULT_AUTO_COLLECT_INTERVAL_SEC=43200

# --- Log capture into coredumps (v2.0.6) ---
# Route Zephyr logs into Memfault's RAM ring buffer; the coredump collects the
# log regions by default (MEMFAULT_COREDUMP_COLLECT_LOG_REGIONS=1), so every
# watchdog/crash trace arrives WITH the last log lines leading up to it (e.g.
# "DMIC read error -11" spam before an audio-watchdog trip, or TLS errors
# before a cloud-stall reboot). 2 KB ring ~= the last few dozen lines; static
# RAM cost ~2 KB. (Marked experimental in the SDK; capture-side only.)
CONFIG_MEMFAULT_LOGGING_ENABLE=y
CONFIG_MEMFAULT_LOGGING_RAM_SIZE=2048

# Reboot after a fatal error so the device auto-recovers and uploads the
# coredump on the next connection (RAM-backed coredump survives a warm reset).
CONFIG_RESET_ON_FATAL_ERROR=y

# --- Hardware watchdog (v1.8.13) ---
# task_wdt on the nRF54 wdt31 (enabled in the board overlay), fed from the audio
# loop (audio_watchdog.c). Every other watchdog here is k_timer-based and cannot
# fire if the kernel clock itself is wedged (a total CPU lockup); the hardware WDT
# resets the SoC regardless. HW fallback is on by default.
CONFIG_WATCHDOG=y
CONFIG_TASK_WDT=y

# Version stamped into the signed MCUboot image (shows in the nRF Cloud FOTA
# bundle manifest and is used for downgrade checks). Keep in sync with the
# VERSION file, which drives the APP_VERSION boot-log marker. Bump both for a
# new FOTA image (e.g. 1.0.0 -> 1.1.0). See docs/fota-test.md.
CONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="2.0.15+0"

# --- External flash (MX25R64 on spi00) for the MCUboot secondary slot ---
# The application needs the SPI-NOR driver compiled in so the Partition
# Manager (and, later, the FOTA download client) can access the off-chip
# secondary image partition.
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_NORDIC_QSPI_NOR=n
CONFIG_STREAM_FLASH=y
