# Smart toilet: single "Shazaam" wake word, no keyword-spotting stage.
# On detection the app blinks LED0 and prints "Wakeword detected" on VCOM0.
CONFIG_APP_MODE_WW_ONLY=y

# Wake-word detection sensitivity (defaults were 990/20/15 = too strict).
# Per-frame probability bar, in 1/1000 (0.80). Mic sensitivity is boosted via
# PDM hardware gain in dmic.c instead of lowering this.
CONFIG_WW_PROBABILITY_THRESHOLD=800
# Sliding vote window length, in 10 ms frames (20 = 200 ms).
CONFIG_WW_HISTORY_SIZE=20
# Frames-above-threshold required within the window to fire (10 of 20).
CONFIG_WW_COUNT_THRESHOLD=10

# nRF Edge AI
CONFIG_NRF_EDGEAI=y

# nRF Edge AI dependencies
CONFIG_NRF_AXON=y
CONFIG_NEWLIB_LIBC=y
CONFIG_FPU=y

# Size of interlayer buffer to fit model
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=6656

# Size of psum buffer to fit model
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

# Enable sensor, button and LED libraries
CONFIG_GPIO=y
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# Enable logging and assert
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_ASSERT=y

CONFIG_UART_ASYNC_API=y
