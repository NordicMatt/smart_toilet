# Smart toilet: single "abracadabra" wake word, no keyword-spotting stage.
# On detection the app blinks LED0 and prints "Wakeword detected" on VCOM0.
CONFIG_APP_MODE_WW_ONLY=y

# Wake-word detection sensitivity (defaults were 990/20/15 = too strict).
# Per-frame probability bar, in 1/1000 (0.80). Mic sensitivity is boosted via
# PDM hardware gain in dmic.c instead of lowering this.
CONFIG_WW_PROBABILITY_THRESHOLD=800
# Sliding vote window length, in 10 ms frames (20 = 200 ms).
CONFIG_WW_HISTORY_SIZE=20
# Frames-above-threshold required within the window to fire (10 of 20).
CONFIG_WW_COUNT_THRESHOLD=10

# nRF Edge AI
CONFIG_NRF_EDGEAI=y

# nRF Edge AI dependencies. NEWLIB is required: the prebuilt Edge AI inference
# library is newlib-ABI (picolibc leaves all nrf_edgeai_* symbols undefined).
CONFIG_NRF_AXON=y
CONFIG_NEWLIB_LIBC=y
CONFIG_FPU=y

# Use full newlib, not newlib-nano.
CONFIG_NEWLIB_LIBC_NANO=n

# Bound the common-libc malloc arena to a fixed size so it does NOT overlap
# newlib's heap. The Wi-Fi supplicant force-selects COMMON_LIBC_MALLOC (hostap
# Kconfig); with ARENA_SIZE=-1 that arena is _end..RAM-end -- the SAME region
# newlib's _sbrk heap uses (HEAP_BASE=_end). malloc()/cJSON use the common
# arena while newlib's mprec float-formatting (Balloc/_Bfree, hit by cJSON/JWT
# on the nRF Cloud path) uses its own _sbrk heap at the same addresses, so the
# two overwrite each other's chunk metadata and bus-fault in cloud_tid during
# JWT generation. A FIXED arena size makes the common heap a static bss buffer
# (below _end), leaving newlib's _sbrk heap the region above _end -- no overlap.
# 64 KB is plenty for cJSON + sockets + getaddrinfo (hostap's big allocations
# use the kernel HEAP_MEM_POOL / NRF_WIFI heaps, not common malloc).
# (The standalone sample avoids all this by using picolibc, no _sbrk heap.)
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=65536

# Size of interlayer buffer to fit model
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=6656

# Size of psum buffer to fit model
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

# Enable sensor, button and LED libraries
CONFIG_GPIO=y
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# Enable logging and assert
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_ASSERT=y

# NOTE: control_output now prints via the console (printk); the async UART API
# is not used (it conflicted with the console once the shield moved it to uart30).
