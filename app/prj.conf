# Smart toilet: single "Abracadabra" wake word, no keyword-spotting stage.
# On detection the app blinks LED0 and prints "Wakeword detected" on VCOM0.
CONFIG_APP_MODE_WW_ONLY=y

# Active wake word (see APP_WW_MODEL choice in Kconfig).
CONFIG_APP_WW_MODEL_ABRACADABRA=y

# Wake-word detection sensitivity (defaults were 990/20/15 = too strict).
# Per-frame probability bar, in 1/1000 (0.60).
CONFIG_WW_PROBABILITY_THRESHOLD=600
# Sliding vote window length, in ~30 ms inference frames (20 = 600 ms).
CONFIG_WW_HISTORY_SIZE=20
# Frames-above-threshold required within the window to fire (7 of 20).
CONFIG_WW_COUNT_THRESHOLD=7
# PDM digital gain in dB (0.5 dB hardware steps, range -20..+20). Hardware
# max, sized for far-field use; speech at the deployment distance peaks around
# -25 dBFS otherwise. Close/loud speech saturates the mic at this gain, and
# the model returns prob ~0 on saturated audio - don't talk into the board.
CONFIG_APP_PDM_GAIN_DB=20

# Front-end cleanup applied to each audio block before detection.
# 120 Hz Butterworth high-pass: strips rumble/handling noise below speech.
CONFIG_APP_AUDIO_HPF=y
# Software AGC: pulls speech peaks toward the target so detection is less
# sensitive to speaker distance. Acts after the PDM hardware gain, so it
# cannot undo saturation in the peripheral itself.
CONFIG_APP_AGC=y
CONFIG_APP_AGC_TARGET_DBFS=-20

# Audio snapshot: DISABLED in the Wi-Fi build. Its multi-second 16 kHz capture
# buffer is hundreds of KB and does not fit alongside the Wi-Fi/cloud/Memfault
# stacks, and its raw-UART dump conflicts with the shield's VCOM0 console.
CONFIG_APP_AUDIO_SNAP=n

# Mic/wake-word tuning telemetry via LOG (VCOM0 with the shield), once per
# second: "audio: peak/rms dBFS + clipped samples" and "ww: peak prob/votes".
# Disable once tuned.
CONFIG_APP_AUDIO_STATS=y
# Float formatting in log messages (dBFS, probabilities).
CONFIG_CBPRINTF_FP_SUPPORT=y

# nRF Edge AI
CONFIG_NRF_EDGEAI=y

# nRF Edge AI dependencies. NEWLIB is required (the prebuilt Edge AI library is
# newlib-ABI). Use full newlib, not nano.
CONFIG_NRF_AXON=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=n
CONFIG_FPU=y

# Bound the common-libc malloc arena to a fixed size so it does not overlap
# newlib's _sbrk heap (both default to a heap at _end). The Wi-Fi supplicant
# force-selects COMMON_LIBC_MALLOC; with ARENA_SIZE=-1 it and newlib's mprec
# float-formatting heap collide and corrupt each other, faulting in cloud_tid
# during nRF Cloud JWT generation. A fixed arena lives in static bss, leaving
# newlib the region above _end.
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=40960

# Size of interlayer buffer to fit model
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=6656

# Size of psum buffer to fit model
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

# Enable sensor, button and LED libraries
CONFIG_GPIO=y
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# Enable logging and assert
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_ASSERT=y

# Async UART is not used: with the nRF7002 shield the console moves to UART30
# (VCOM0) and control output goes via printk, so the async API is left off.
CONFIG_UART_ASYNC_API=n

# --- Memfault (coredumps, reboot reasons, metrics) ---
# Captured on-device and forwarded as chunks through the nRF Cloud CoAP
# connection (see cloud.c). No device-side project key needed for forwarding.
CONFIG_MEMFAULT=y
CONFIG_MEMFAULT_NCS_PROJECT_KEY=""
CONFIG_MEMFAULT_NCS_DEVICE_ID_HW_ID=y
CONFIG_MEMFAULT_NCS_FW_TYPE="smart-toilet"
CONFIG_MEMFAULT_NCS_FW_VERSION_STATIC=y
CONFIG_MEMFAULT_NCS_FW_VERSION="1.0.0+wifi"
CONFIG_MEMFAULT_NCS_HW_VERSION="nrf54lm20dk"
CONFIG_MEMFAULT_RAM_BACKED_COREDUMP=y
CONFIG_MEMFAULT_RAM_BACKED_COREDUMP_SIZE=4096
CONFIG_MEMFAULT_USER_CONFIG_ENABLE=n

# Reboot after a fatal error so the device auto-recovers and uploads the
# coredump on the next connection (RAM-backed coredump survives a warm reset).
CONFIG_RESET_ON_FATAL_ERROR=y
