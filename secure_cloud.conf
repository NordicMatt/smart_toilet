# Build the Wi-Fi + nRF Cloud CoAP stack SECURE (cpuapp, no TF-M).
CONFIG_BUILD_WITH_TFM=n
CONFIG_TRUSTED_EXECUTION_NONSECURE=n
CONFIG_TFM_PARTITION_PROTECTED_STORAGE=n
# Credentials: compile in + store in volatile (RAM) backend instead of TF-M Protected Storage.
CONFIG_TLS_CREDENTIALS_BACKEND_PROTECTED_STORAGE=n
CONFIG_TLS_CREDENTIALS_BACKEND_VOLATILE=y
CONFIG_NRF_CLOUD_PROVISION_CERTIFICATES=y
# DTLS/cert fixes proven necessary.
CONFIG_HOSTAP_CRYPTO_ALT_LEGACY_PSA=y
CONFIG_MBEDTLS_PEM_PARSE_C=y
